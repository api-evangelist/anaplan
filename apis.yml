description: >
  Anaplan is a cloud-native connected planning platform used by enterprises for
  financial planning and analysis (FP&A), supply chain planning, and sales performance
  management. Its REST API (Integration API v2.0) allows integrators to import and
  export data, trigger model processes, and manage Anaplan workspaces programmatically.
  Beyond bulk data operations, Anaplan exposes dedicated APIs for financial consolidation,
  identity management via SCIM, audit event streaming, application lifecycle management,
  and CloudWorks custom integrations. All API access requires authentication via the
  Anaplan Authentication Service API, which issues tokens using username/password
  credentials or client certificates.
tags:
  - Connected Planning
  - Enterprise Planning
  - FP&A
  - Supply Chain
  - Sales Planning
  - Financial Consolidation
  - SCIM
  - REST
